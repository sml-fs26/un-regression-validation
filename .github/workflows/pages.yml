name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, proposals-preview]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # main is served at the site root
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: site

      # proposals-preview is served at /preview/
      - name: Checkout proposals-preview
        uses: actions/checkout@v4
        with:
          ref: proposals-preview
          path: site/preview
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
